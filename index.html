<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1 class="text-center mb-5">Battery Manager</h1>

  <!-- Add Battery Form -->
  <div class="card mb-5">
    <h3 class="mb-3">Add New Battery</h3>
    <form id="batteryForm">
      <div class="row g-3">
        <div class="col-md-6"><input class="form-control" name="biker_name" placeholder="Biker Name" required></div>
        <div class="col-md-6"><input class="form-control" name="phone_number" placeholder="Phone Number" required></div>
        <div class="col-md-6"><input class="form-control" name="reg_number" placeholder="Registration Number" required></div>
        <div class="col-md-6"><input class="form-control" name="battery_company" placeholder="Battery Company" required></div>
        <div class="col-md-6">
          <select class="form-select" name="battery_type">
            <option>Chargeable</option>
            <option>Non-chargeable</option>
          </select>
        </div>
        <div class="col-md-6"><input class="form-control" name="dealer_name" placeholder="Dealer Name"></div>
        <div class="col-md-6"><input class="form-control" type="date" name="warranty_start_date"></div>
        <div class="col-md-6"><input class="form-control" name="frame_number" placeholder="Frame Number"></div>
        <div class="col-md-6"><input class="form-control" name="engine_number" placeholder="Engine Number"></div>
      </div>
      <button class="btn btn-primary mt-4" type="submit">Add Battery</button>
    </form>
  </div>

  <!-- Search -->
  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search by Registration Number">
  </div>

  <!-- Battery Table -->
  <div class="card">
    <h3 class="mb-3">All Batteries</h3>
    <table class="table table-striped" id="batteryTable">
      <thead>
        <tr>
          <th>Biker Name</th><th>Phone</th><th>Reg Number</th><th>Battery</th><th>Type</th>
          <th>Dealer</th><th>Warranty</th><th>Frame</th><th>Engine</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
