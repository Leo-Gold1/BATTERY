<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔋 Battery Manager</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="toast" class="toast"></div>

<div class="card" id="loginCard">
  <h2>🌎🌎 Battery Manager</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<div class="hidden" id="dashboard">

<header>
<h1>Battery Dashboard</h1>
<button class="logoutBtn" onclick="logout()">Logout</button>
</header>

<div class="form-container">
<form id="batteryForm">
<input name="customer_name" placeholder="Customer Name" required>
<input name="phone_number" placeholder="Phone Number" required>
<input name="reg_number" placeholder="Registration Number" required>
<input name="battery_company" placeholder="Battery Company" required>
<input type="date" name="battery_sent_date">
<input name="dealer_name" placeholder="Dealer Name">
<input name="frame_number" placeholder="Frame Number">
<input name="engine_number" placeholder="Engine Number">
<button type="submit">Add Battery</button>
</form>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Reg</th>
<th>Company</th>
<th>Sent</th>
<th>Dealer</th>
<th>Frame</th>
<th>Engine</th>
<th></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script src="/config.js"></script>

<script>
function showToast(msg, success=true){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.background=success?"#28a745":"#dc3545";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

function login(){
  if(
    username.value===LOGIN_USER &&
    password.value===LOGIN_PASS
  ){
    loginCard.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadBatteries();
  }else{
    error.innerText="Wrong credentials";
  }
}

function logout(){ location.reload(); }

batteryForm.addEventListener("submit",async e=>{
  e.preventDefault();
  const data=Object.fromEntries(new FormData(e.target).entries());

  const res=await fetch("/api/add-battery",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  if(res.ok){
    showToast("Battery Added ✅");
    e.target.reset();
    loadBatteries();
  }
});

async function loadBatteries(){
  const res=await fetch("/api/batteries");
  const batteries=await res.json();

  tableBody.innerHTML="";
  batteries.forEach(b=>{
    tableBody.innerHTML+=`
    <tr>
      <td>${b.customer_name}</td>
      <td>${b.phone_number}</td>
      <td>${b.reg_number}</td>
      <td>${b.battery_company}</td>
      <td>${b.battery_sent_date?b.battery_sent_date.split("T")[0]:""}</td>
      <td>${b.dealer_name||""}</td>
      <td>${b.frame_number||""}</td>
      <td>${b.engine_number||""}</td>
      <td>
        <button onclick="deleteBattery(${b.id})">✖</button>
      </td>
    </tr>`;
  });
}

async function deleteBattery(id){
  const pass=prompt("Enter delete password");
  if(pass!==DELETE_PASS){ showToast("Wrong password",false); return; }

  await fetch("/api/delete-battery/"+id,{
    method:"DELETE",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:pass})
  });

  showToast("Deleted");
  loadBatteries();
}
</script>

</body>
</html>
