<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battery Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" id="loginCard">
  <h2>Battery Manager</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<div class="hidden" id="dashboard">
  <h1>Dashboard</h1>

  <form id="batteryForm">
    <input name="biker_name" placeholder="Name" required>
    <input name="phone_number" placeholder="Phone" required>
    <input name="reg_number" placeholder="Reg No" required>
    <input name="battery_company" placeholder="Company" required>
    <select name="battery_type">
      <option>Chargeable</option>
      <option>Non-chargeable</option>
    </select>
    <button type="submit">Add Battery</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>Reg</th><th>Company</th><th>Delete</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
